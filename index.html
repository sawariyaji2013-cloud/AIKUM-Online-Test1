<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>AIKUM शिक्षा केंद्र Online Test</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0f3460;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.question{
margin-top:18px;
font-size:18px;
}

.timer{
font-size:22px;
color:red;
text-align:right;
}

button{
padding:10px 20px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

.result{
font-size:22px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
AIKUM शिक्षा केंद्र  
Full Mock Test
</header>

<div class="container" id="login">

<h2>अपना नाम लिखें</h2>

<input type="text" id="name" style="padding:10px;width:60%">

<br><br>

<button onclick="startExam()">Test Start करें</button>

</div>

<div class="container" id="exam" style="display:none">

<div class="timer">
समय शेष: <span id="time">3600</span> सेकंड
</div>

<div id="questions"></div>

<button onclick="submitExam()">Test Submit</button>

<div class="result" id="result"></div>

</div>

<script>

let questions=[

// संविधान
["संविधान की प्रस्तावना में समाजवादी और पंथनिरपेक्ष शब्द किस संशोधन से जुड़े?",["42वां","44वां","52वां","86वां"],0],

["मौलिक अधिकार संविधान के किस भाग में हैं?",["भाग II","भाग III","भाग IV","भाग V"],1],

["अस्पृश्यता का अंत किस अनुच्छेद में है?",["15","16","17","18"],2],

["संसदीय प्रणाली किस देश से ली गई है?",["अमेरिका","ब्रिटेन","कनाडा","फ्रांस"],1],

["राष्ट्रीय आपातकाल किस अनुच्छेद में है?",["350","352","356","360"],1],

// रीजनिंग
["DOG = EPH तो CAT = ?",["DBU","DCV","DBT","EBV"],2],

["एक लाइन में 40 विद्यार्थी हैं, राहुल ऊपर से 12वें स्थान पर है। नीचे से स्थान?",["28","29","30","31"],1],

["1 के सामने 6 और 2 के सामने 5 है। 3 के सामने क्या होगा?",["1","2","4","6"],2],

["SUN = TVO तो MOON = ?",["NPPN","NQPO","NPPQ","NPPO"],3],

// भिन्न
["7/9 = x/27 तो x ?",["18","19","20","21"],3],

["4/7 का व्युत्क्रम क्या है?",["7/4","4/7","1/7","1/4"],0],

["सबसे बड़ा भिन्न कौन सा है?",["5/6","7/8","9/10","11/12"],3],

["3/5 = x/20 तो x ?",["10","12","15","18"],1],

["यदि भिन्न का अंश और हर दोनों को एक ही संख्या से गुणा करें तो क्या होगा?",["मान बदलता है","मान वही रहता है","शून्य","अनंत"],1]

];

function startExam(){

document.getElementById("login").style.display="none"
document.getElementById("exam").style.display="block"

let html=""

for(let i=0;i<questions.length;i++){

html+="<div class='question'>"+(i+1)+". "+questions[i][0]+"<br>"

for(let j=0;j<4;j++){

html+="<input type='radio' name='q"+i+"' value='"+j+"'> "+questions[i][1][j]+"<br>"

}

html+="</div>"

}

document.getElementById("questions").innerHTML=html

}

function submitExam(){

let score=0

for(let i=0;i<questions.length;i++){

let q=document.querySelector('input[name="q'+i+'"]:checked')

if(q && parseInt(q.value)==questions[i][2]){

score++

}

}

let name=document.getElementById("name").value

let percent=(score/questions.length)*100

document.getElementById("result").innerHTML=

"छात्र: "+name+"<br>"+
"कुल प्रश्न: "+questions.length+"<br>"+
"सही उत्तर: "+score+"<br>"+
"प्रतिशत: "+percent.toFixed(2)+"%"

}

let time=3600

setInterval(function(){

time--

document.getElementById("time").innerText=time

if(time<=0){

submitExam()

}

},1000)

</script>

</body>
</html>
