```html
<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<title>AIKUM शिक्षा केंद्र Online Exam</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

header{
background:#0f3460;
color:white;
text-align:center;
padding:20px;
font-size:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.question{
margin-top:20px;
font-size:18px;
}

.timer{
color:red;
font-size:22px;
text-align:right;
}

button{
background:#27ae60;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.result{
font-size:24px;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table,th,td{
border:1px solid gray;
padding:10px;
text-align:center;
}

</style>

</head>

<body>

<header>
AIKUM शिक्षा केंद्र  
Online Exam Portal
</header>

<div class="container" id="login">

<h2>छात्र का नाम लिखें</h2>

<input type="text" id="name" style="padding:10px;width:60%">

<br><br>

<button onclick="startExam()">Test Start करें</button>

</div>

<div class="container" id="exam" style="display:none">

<div class="timer">
समय शेष: <span id="time">3600</span> सेकंड
</div>

<div id="questions"></div>

<button onclick="submitExam()">Test Submit करें</button>

<div class="result" id="result"></div>

<button onclick="downloadCertificate()" id="certBtn" style="display:none">
Certificate Download
</button>

</div>

<div class="container">

<h2>Topper Board</h2>

<table id="topperTable">

<tr>
<th>नाम</th>
<th>स्कोर</th>
<th>प्रतिशत</th>
</tr>

</table>

</div>

<script>

let questions=[]

for(let i=1;i<=100;i++){

questions.push([
"प्रश्न "+i+": 3/4 + 1/2 = ?",
["1.00","1.25","1.50","1.75"],
1
])

}

function startExam(){

document.getElementById("login").style.display="none"
document.getElementById("exam").style.display="block"

let html=""

for(let i=0;i<questions.length;i++){

html+="<div class='question'>"+questions[i][0]+"<br>"

for(let j=0;j<4;j++){

html+="<input type='radio' name='q"+i+"' value='"+j+"'> "+questions[i][1][j]+"<br>"

}

html+="</div>"

}

document.getElementById("questions").innerHTML=html

}

function submitExam(){

let score=0

for(let i=0;i<questions.length;i++){

let q=document.querySelector('input[name="q'+i+'"]:checked')

if(q && parseInt(q.value)==questions[i][2]){

score++

}

}

let name=document.getElementById("name").value

let percent=(score/questions.length)*100

document.getElementById("result").innerHTML=

"छात्र: "+name+"<br>"+
"सही उत्तर: "+score+" / "+questions.length+"<br>"+
"प्रतिशत: "+percent.toFixed(2)+"%"

document.getElementById("certBtn").style.display="block"

saveTopper(name,score,percent)

}

function saveTopper(name,score,percent){

let toppers=JSON.parse(localStorage.getItem("toppers"))||[]

toppers.push({name:name,score:score,percent:percent})

toppers.sort((a,b)=>b.score-a.score)

toppers=toppers.slice(0,10)

localStorage.setItem("toppers",JSON.stringify(toppers))

showToppers()

}

function showToppers(){

let toppers=JSON.parse(localStorage.getItem("toppers"))||[]

let table=document.getElementById("topperTable")

for(let i=0;i<toppers.length;i++){

let row="<tr><td>"+toppers[i].name+"</td><td>"+toppers[i].score+"</td><td>"+toppers[i].percent.toFixed(2)+"%</td></tr>"

table.innerHTML+=row

}

}

showToppers()

function downloadCertificate(){

let name=document.getElementById("name").value

let text="Certificate of Achievement\n\nयह प्रमाणित किया जाता है कि "+name+" ने AIKUM शिक्षा केंद्र का Online Test सफलतापूर्वक पूरा किया।"

let blob=new Blob([text],{type:"text/plain"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="Certificate_"+name+".txt"

link.click()

}

let time=3600

setInterval(function(){

time--

document.getElementById("time").innerText=time

if(time<=0){

submitExam()

}

},1000)

</script>

</body>
</html>
```
