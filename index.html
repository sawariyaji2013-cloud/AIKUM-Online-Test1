<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>AIKUM शिक्षा केंद्र - Online Exam Portal</title>
<style>
body{
font-family: Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:0;
}
header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}
.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}
.question{
margin:20px 0;
}
.timer{
color:red;
font-size:18px;
text-align:right;
}
button{
background:#27ae60;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}
button:hover{
background:#1e8449;
}
.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>AIKUM शिक्षा केंद्र - Online Test</header>

<div class="container">

<label>छात्र का नाम:</label>
<input type="text" id="studentName" style="width:60%; padding:8px">

<div class="timer">
समय शेष: <span id="time">300</span> सेकंड
</div>

<hr>

<div class="question">
1. 3/4 + 5/8 + 0.5 = ?
<br>
<input type="radio" name="q1" value="0"> 1.625
<br>
<input type="radio" name="q1" value="1"> 1.875
<br>
<input type="radio" name="q1" value="0"> 2.125
<br>
<input type="radio" name="q1" value="0"> 2.375
</div>

<div class="question">
2. 7/6 + 3/4 – 5/12 = ?
<br>
<input type="radio" name="q2" value="0"> 1.25
<br>
<input type="radio" name="q2" value="1"> 1.50
<br>
<input type="radio" name="q2" value="0"> 1.75
<br>
<input type="radio" name="q2" value="0"> 2.00
</div>

<div class="question">
3. 5/9 × 6/7 + 0.5 = ?
<br>
<input type="radio" name="q3" value="1"> 0.97
<br>
<input type="radio" name="q3" value="0"> 0.87
<br>
<input type="radio" name="q3" value="0"> 0.95
<br>
<input type="radio" name="q3" value="0"> 1.05
</div>

<div class="question">
4. 4/5 + 7/10 + 0.2 = ?
<br>
<input type="radio" name="q4" value="0"> 1.50
<br>
<input type="radio" name="q4" value="0"> 1.60
<br>
<input type="radio" name="q4" value="0"> 1.70
<br>
<input type="radio" name="q4" value="1"> 1.80
</div>

<br>

<button onclick="submitTest()">Test Submit करें</button>

<div class="result" id="result"></div>

</div>

<script>

function submitTest(){

let score=0

let q1=document.querySelector('input[name="q1"]:checked')
let q2=document.querySelector('input[name="q2"]:checked')
let q3=document.querySelector('input[name="q3"]:checked')
let q4=document.querySelector('input[name="q4"]:checked')

if(q1) score+=parseInt(q1.value)
if(q2) score+=parseInt(q2.value)
if(q3) score+=parseInt(q3.value)
if(q4) score+=parseInt(q4.value)

let name=document.getElementById("studentName").value

document.getElementById("result").innerHTML=
"छात्र: "+name+"<br>आपका स्कोर: "+score+" / 4"

}

let time=300

let timer=setInterval(function(){

time--

document.getElementById("time").innerText=time

if(time<=0){
clearInterval(timer)
submitTest()
}

},1000)

</script>

</body>
</html>
