}

html+="</div>"

}

}

function submitExam(){

let score=0

for(let i=0;i<questions.length;i++){

let q=document.querySelector('input[name="q'+i+'"]:checked')

if(q && parseInt(q.value)==questions[i][2]){

score++

}

}

let percent=(score/questions.length)*100

"सही उत्तर: "+score+"<br>"+
"प्रतिशत: "+percent.toFixed(2)+"%"

}
